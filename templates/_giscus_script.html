<script>
  const LIGHT_URL = "{{ get_url(path='css/giscus-light.css') }}";
  const DARK_URL  = "{{ get_url(path='css/giscus-dark.css') }}";

  function giscusThemeUrl() {
    return document.documentElement.classList.contains('dark') ? DARK_URL : LIGHT_URL;
  }

  function setGiscusTheme(url) {
    let frame = document.querySelector('iframe.giscus-frame');
    if (frame) {
      frame.contentWindow.postMessage(
        { giscus: { setConfig: { theme: url } } },
        'https://giscus.app'
      );
    }
  }

  let currentThemeUrl = giscusThemeUrl();

  let s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo',             'komar007/komar007.github.io');
  s.setAttribute('data-repo-id',          'R_kgDOTA0E9Q');
  s.setAttribute('data-category',         'Announcements');
  s.setAttribute('data-category-id',      'DIC_kwDOTA0E9c4C_0oJ');
  s.setAttribute('data-mapping',          'og:title');
  s.setAttribute('data-strict',           '1');
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata',    '0');
  s.setAttribute('data-input-position',   'top');
  s.setAttribute('data-theme',            currentThemeUrl);
  s.setAttribute('data-lang',             'en');
  s.crossOrigin = 'anonymous';
  s.async = true;
  document.body.appendChild(s);

  new MutationObserver(function() {
    let next = giscusThemeUrl();
    if (next !== currentThemeUrl) {
      currentThemeUrl = next;
      setGiscusTheme(next);
    }
  }).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['class']
  });
</script>
